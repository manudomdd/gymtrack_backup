# Gradle properties for GymTrackAndroid

# Habilita AndroidX (requerido por las dependencias del proyecto)
android.useAndroidX=true

# Migra automáticamente dependencias antiguas de Support Library a AndroidX
android.enableJetifier=true

# Aumenta la memoria disponible para el daemon de Gradle
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Caché de configuración deshabilitada (puede causar falsos positivos con AndroidX en AGP)
# org.gradle.configuration-cache=true
